name: Deploy Invercrypto 2.0 Engine to AWS EC2

on:
  push:
    branches:
      - main  # Verify if your default repo branch is named 'main' or 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Deploy Strategy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "🏎️ Firing up the live deployment pipeline on EC2..."
            
            # Absolute target directory definition
            TARGET_DIR="/home/ec2-user/invercrypto"
            
            # Check if directory exists; clone if fresh, pull if existing
            if [ ! -d "$TARGET_DIR" ]; then
              echo "Creating absolute project directory..."
              git clone git@github.com:${{ github.repository }}.git $TARGET_DIR
              cd $TARGET_DIR
            else
              cd $TARGET_DIR
              echo "Pulling latest quantitative engine updates..."
              git reset --hard HEAD
              git pull origin main
            fi

            # Local Environment Variable Sheet Guard
            if [ ! -f ".env" ]; then
              echo "⚠️ WARNING: Live production .env file missing. Constructing placeholder..."
              touch .env
            fi

            echo "📦 Commencing Docker image compilation layers..."
            docker build -t invercrypto-engine .
            
            echo "🛑 Clearing stale container processes..."
            docker stop invercrypto-live || true
            docker rm invercrypto-live || true

            echo "🚀 Launching live automated strategy instance..."
            docker run -d \
              --name invercrypto-live \
              --restart unless-stopped \
              --env-file .env \
              -v /home/ec2-user/invercrypto/data:/app/data \
              invercrypto-engine

            echo "🦅 Live Engine online! Sampling execution diagnostics:"
            sleep 3
            docker logs --tail 20 invercrypto-live