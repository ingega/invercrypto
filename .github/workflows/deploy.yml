name: Deploy Invercrypto 2.0 Engine to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Deploy Strategy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Firing up the live deployment pipeline on EC2..."
            
            TARGET_DIR="/home/ec2-user/invercrypto"
            
            if [ ! -d "$TARGET_DIR/.git" ]; then
              echo "🔄 Folder untracked. Initializing clean clone sequence..."
              rm -rf /tmp/invercrypto_clone
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/invercrypto_clone
              mkdir -p $TARGET_DIR
              cp -r /tmp/invercrypto_clone/. $TARGET_DIR/
              rm -rf /tmp/invercrypto_clone
              cd $TARGET_DIR
              git config --global --add safe.directory $TARGET_DIR
            else
              cd $TARGET_DIR
              echo "Pulling latest quantitative engine updates..."
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git reset --hard HEAD
              git pull origin main
            fi

            # Environment file fallback guard
            if [ ! -f ".env" ]; then touch .env; fi

            # =========================================================================
            # 🛡️ PERSISTENT DATA LOGS DIRECTORY GUARD
            # =========================================================================
            echo "📁 Ensuring persistent storage directory exists..."
            mkdir -p $TARGET_DIR/data
            chmod -R 777 $TARGET_DIR/data

            echo "📦 Commencing Docker image compilation layers..."
            docker build -f strategy/Dockerfile -t invercrypto-engine .
            
            echo "🛑 Clearing stale container processes..."
            docker stop invercrypto-live || true
            docker rm invercrypto-live || true

            echo "🚀 Launching live automated strategy instance..."
            docker run -d \
              --name invercrypto-live \
              --restart unless-stopped \
              --env-file .env \
              -v $TARGET_DIR/data:/app/data \
              invercrypto-engine

            echo "🦅 Live Engine online! Sampling execution diagnostics:"
            sleep 3
            docker logs --tail 20 invercrypto-live

            # =========================================================================
            # 🧹 SAFE PRODUCTION DISK CLEANUP PROTOCOL
            # =========================================================================
            echo "🧹 Commencing disk recovery layer..."
            
            # Safe standard prune to clear building leftovers without a complete purge
            docker builder prune -f
            docker image prune -f
            
            echo "📊 Current System Storage Telemetry:"
            docker system df