name: Deploy Invercrypto 2.0 Engine to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Deploy Strategy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "🏎️ Firing up the live deployment pipeline on EC2..."
            
            TARGET_DIR="/home/ec2-user/invercrypto"
            
            # Smart Directory Guard: Check if it's a valid tracked git tree
            if [ ! -d "$TARGET_DIR/.git" ]; then
              echo "🔄 Folder is fresh or untracked. Initializing clean clone sequence..."
              
              # If user manually created the folder for the .env, we clone into a temp directory and sync it
              rm -rf /tmp/invercrypto_clone
              git clone https://github.com/${{ github.repository }}.git /tmp/invercrypto_clone
              
              # Create target directory if it doesn't exist, then copy files without overwriting your manual .env
              mkdir -p $TARGET_DIR
              cp -r /tmp/invercrypto_clone/. $TARGET_DIR/
              rm -rf /tmp/invercrypto_clone
              
              cd $TARGET_DIR
            else
              cd $TARGET_DIR
              echo "Pulling latest quantitative engine updates..."
              git reset --hard HEAD
              git pull origin main
            fi

            # Double-check environment variables sheet presence
            if [ ! -f ".env" ]; then
              echo "⚠️ WARNING: Live production .env file missing. Constructing placeholder..."
              touch .env
            fi

            echo "📦 Commencing Docker image compilation layers..."
            docker build -t invercrypto-engine .
            
            echo "🛑 Clearing stale container processes..."
            docker stop invercrypto-live || true
            docker rm invercrypto-live || true

            echo "🚀 Launching live automated strategy instance..."
            docker run -d \
              --name invercrypto-live \
              --restart unless-stopped \
              --env-file .env \
              -v /home/ec2-user/invercrypto/data:/app/data \
              invercrypto-engine

            echo "🦅 Live Engine online! Sampling execution diagnostics:"
            sleep 3
            docker logs --tail 20 invercrypto-live